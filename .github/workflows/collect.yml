name: collect

on:
  schedule:
    - cron: "5 0,4,11 * * *"
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 采集 + 计算
        run: npm run collect
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: 提交数据到 master
        shell: bash
        run: |
          git config user.name "lxx"
          git config user.email "honors123456@163.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "chore(data): snapshot $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M') (+8)"
            git fetch origin master
            if ! git rebase FETCH_HEAD; then
              echo "rebase 失败改用 merge"
              git rebase --abort
              git pull --no-edit
            fi
            git push
          fi

      - name: 构建 + 部署网站（含最新数据）
        run: npm run build

      - name: 发布到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
          publish_branch: gh-pages
          force_orphan: true
