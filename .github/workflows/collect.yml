name: collect

on:
  schedule:
    # UTC 00:05 / 04:05 / 11:05 = 北京时间 08:05 / 12:05 / 19:05
    - cron: "5 0,4,11 * * *"
  workflow_dispatch:

concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 采集 + 计算
        run: npm run collect
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: 提交数据到 master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/public/data/
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            git commit -m "chore(data): snapshot $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M') (+8)"
            git pull --rebase origin ${{ github.ref_name }}
            git push
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: 同步数据到 gh-pages 分支
        if: env.has_changes == 'true'
        run: |
          git fetch origin gh-pages || git checkout --orphan gh-pages-tmp
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          # 保留站点文件，仅更新 data/ 目录
          git checkout master -- site/public/data/ 2>/dev/null || true
          mkdir -p data
          cp -r site/public/data/* data/ 2>/dev/null || true
          git add data/
          if git diff --cached --quiet; then
            echo "gh-pages 数据无变化"
          else
            git commit -m "chore(data): sync $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M') (+8)"
            git push origin gh-pages
          fi
          git checkout master
