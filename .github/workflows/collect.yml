name: collect-and-deploy

on:
  schedule:
    # UTC 00:05 / 04:05 / 11:05 = 北京时间 08:05 / 12:05 / 19:05
    - cron: "5 0,4,11 * * *"
  workflow_dispatch:

# 同一时间只跑一轮，避免快照互相覆盖
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 采集 + 计算榜单
        run: npm run collect
        env:
          # PAT（无 scope），内置 GITHUB_TOKEN 只有 1000 次/小时不够用
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: 提交快照数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无数据变更，跳过提交"
          else
            git commit -m "chore(data): snapshot $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M') (+8)"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - name: 构建站点
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
